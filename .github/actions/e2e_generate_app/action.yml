name: e2e_generate_app
inputs:
  PROJECT_KEY:
    description: Project key to specify project to generate ("retail-app-demo")
    required: true
    type: string
runs:
  using: composite
  steps:
  - name: Generate new project based on project-key
    run: node e2e/scripts/generate-project.js ${{ inputs.PROJECT_KEY }}
    shell: bash
