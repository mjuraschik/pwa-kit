name: update_mrt_target
description: Update a target. This endpoint automatically re-deploys the current bundle if any of the SSR-related properties are changed.
inputs:
    PROJECT_SLUG:
        description: 'MRT Project slug'
        required: true
    TARGET_SLUG:
        description: 'MRT Target slug'
        required: true
    MOBIFY_API_KEY:
        description: 'Mobify API key'
        required: true
    CLOUD_ORIGIN:
        description: 'MRT Cloud origin'
        required: false
        default: 'https://cloud.mobify.com'
    ENV_FILE_PATH:
        description: 'Path to .env file containing environment variables to set on the MRT target'
        required: false
        default: '.env'

runs:
    using: composite
    steps:
        - name: Update MRT Target Environment Variables
          id: update_mrt_target_env_var
          shell: bash
          run: |-
              set -e

              # Build arguments for the Node.js script
              ARGS=(
                  "--project-slug" "${{ inputs.PROJECT_SLUG }}"
                  "--target-slug" "${{ inputs.TARGET_SLUG }}"
                  "--mobify-api-key" "${{ inputs.MOBIFY_API_KEY }}"
                  "--env-file" "${{ inputs.ENV_FILE_PATH }}"
              )

              # Run the Node.js script
              node e2e/scripts/update-mrt-target.js env-var "${ARGS[@]}"
